AWSTemplateFormatVersion: 2010-09-09
Description: S3 bucket for the event-driven data platform

Resources:
  DataPlatformBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: data-platform-event-driven-project
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: data-platform-event-driven-project

  DataPlatformBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataPlatformBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: DenyNonHTTPS
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:aws:s3:::${DataPlatformBucket}"
              - !Sub "arn:aws:s3:::${DataPlatformBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref DataPlatformBucket
    Export:
      Name: data-platform-bucket-name

  BucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt DataPlatformBucket.Arn
    Export:
      Name: data-platform-bucket-arn