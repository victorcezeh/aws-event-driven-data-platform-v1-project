AWSTemplateFormatVersion: 2010-09-09
Description: IAM roles and policies for the event-driven data platform

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: data-platform-lambda-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: data-platform-lambda-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "arn:aws:s3:::data-platform-event-driven-project/raw/*"

              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: "arn:aws:s3:::data-platform-event-driven-project/processed/*"

              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:data-platform-*"

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"

              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub "arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:data-platform-*"

  RedshiftS3Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: data-platform-redshift-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: redshift.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: data-platform-redshift-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: "arn:aws:s3:::data-platform-event-driven-project"

              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "arn:aws:s3:::data-platform-event-driven-project/processed/*"

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/redshift/*"

              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub "arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:data-platform-*"

Outputs:
  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: data-platform-lambda-role-arn

  RedshiftS3RoleArn:
    Description: Redshift S3 Role ARN
    Value: !GetAtt RedshiftS3Role.Arn
    Export:
      Name: data-platform-redshift-role-arn